paths:
  input_csv: "data/finfact_bd/finfact_bd_originals.csv"
  output_dir: "data/generated/rewrite_generation"
  checkpoint: "data/generated/rewrite_generation/checkpoint.json"

input:
  id_column: "article_id"
  headline_column: "headline"
  text_column: "text"

pipeline:
  seed: 42

claim_extraction:
  min_confidence: 0.35
  min_sentence_chars: 18
  max_sentences: 80

claim_ranking:
  min_overall_score: 0.52
  max_risk_score: 0.72

planner:
  allowed_families:
    - numerical_fact
    - policy_reversal
    - entity_replacement
    - temporal_shift
    - causal_inversion

generation:
  max_new_tokens: 768
  temperature: 0.4

regeneration:
  max_attempts: 3
  temperature_step: 0.15

verification:
  semantic_similarity_min: 0.74
  contradiction_min: 0.55
  fluency_max_perplexity: 220.0
  duplicate_max_similarity: 0.985

models:
  device: "cuda"
  generator:
    backend: "hf_seq2seq"
    model_name: "csebuetnlp/banglat5"
    revision: "main"
  embedding:
    model_name: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
  nli:
    model_name: "MoritzLaurer/mDeBERTa-v3-base-xnli-multilingual-nli-2mil7"
    revision: "main"
  fluency:
    model_name: "sagorsarker/bangla-gpt2"
    revision: "main"

human_validation:
  enabled: true
  workbook: "human_validation.xlsx"
