paths:
  input_csv: "data/finfact_bd/finfact_bd_originals.csv"
  output_dir: "data/generated/rewrite_generation"
  checkpoint: "data/generated/rewrite_generation/checkpoint.json"

input:
  id_column: "article_id"
  headline_column: "headline"
  text_column: "text"

pipeline:
  seed: 42

claim_extraction:
  backend: "llm_json"
  min_confidence: 0.35
  min_sentence_chars: 18
  max_sentences: 80
  max_claims: 12
  max_new_tokens: 1536
  temperature: 0.0
  seed: 42
  json_repair_attempts: 1

claim_ranking:
  min_overall_score: 0.52
  max_risk_score: 0.72

planner:
  backend: "llm_json"
  allowed_families:
    - numerical_fact
    - policy_reversal
    - entity_replacement
    - temporal_shift
    - causal_inversion
  max_new_tokens: 768
  temperature: 0.0
  seed: 43
  json_repair_attempts: 1

generation:
  max_new_tokens: 1024
  temperature: 0.4

regeneration:
  max_attempts: 3
  temperature_step: 0.15

verification:
  batch_size: 8
  semantic_similarity_min: 0.74
  contradiction_min: 0.55
  fluency_max_perplexity: 220.0
  duplicate_max_similarity: 0.985

models:
  device: "cuda"
  extractor:
    enabled: true
    backend: "hf_causal_lm"
    model_name: "Qwen/Qwen3-8B"
    revision: "main"
    load_in_4bit: true
    lazy: true
    unload_after_call: false
    use_chat_template: true
    chat_template_kwargs:
      enable_thinking: false
  planner:
    enabled: true
    share_with: "extractor"
  generator:
    backend: "hf_causal_lm"
    model_name: "CohereLabs/aya-expanse-8b"
    revision: "main"
    load_in_4bit: true
    lazy: true
    unload_after_call: false
    use_chat_template: true
  embedding:
    model_name: "intfloat/multilingual-e5-large"
    prefix: "passage: "
  nli:
    model_name: "MoritzLaurer/mDeBERTa-v3-base-xnli-multilingual-nli-2mil7"
    revision: "main"
  fluency:
    backend: "hf_electra_discriminator"
    model_name: "csebuetnlp/banglabert"
    revision: "main"

human_validation:
  enabled: true
  workbook: "human_validation.xlsx"
